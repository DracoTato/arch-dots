<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
<alias>
   <family>serif</family>
   <prefer>
     <family>Adwaita-Serif</family>
     <family>Noto Serif Arabic</family>
   </prefer>
  </alias>
<alias>
   <family>sans-serif</family>
   <prefer>
     <family>Adwaita-Sans</family>
     <family>Noto Sans Arabic</family>
   </prefer>
  </alias>
<alias>
   <family>monospace</family>
   <prefer>
     <family>Monospace</family>
     <family>Noto Sans Arabic</family>
   </prefer>
 </alias>
</fontconfig>

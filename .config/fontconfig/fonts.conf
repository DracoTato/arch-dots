<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
<alias>
   <family>serif</family>
   <prefer>
     <family>Cantarell</family>
     <family>Noto Sans Arabic</family>
   </prefer>
 </alias>
<alias>
   <family>sans-serif</family>
   <prefer>
     <family>Adwaita Sans</family>
     <family>Noto Sans Arabic</family>
   </prefer>
 </alias>
<alias>
   <family>monospace</family>
   <prefer>
     <family>FiraCode Nerd Font Propo</family>
     <family>Monospace</family>
     <family>Noto Sans Arabic</family>
   </prefer>
 </alias>
</fontconfig>
